<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HydroTech</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#020b18;
  font-family:'Space Grotesk',sans-serif;
  overflow:hidden;
}

#landing{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

#stars{position:absolute;inset:0;pointer-events:none;z-index:1;}
#waveC{position:absolute;bottom:0;left:0;width:100%;height:50%;pointer-events:none;z-index:2;}

.brand{
  position:relative;z-index:10;
  font-size:clamp(52px,10vw,96px);
  font-weight:700;
  background:linear-gradient(170deg,#fff 0%,#7dd3fc 55%,#0284c7 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-3px;line-height:1;
  animation:fadeD .9s ease both;
}

.earth-scene{
  position:relative;z-index:10;
  margin-top:44px;
  display:flex;flex-direction:column;align-items:center;
  animation:fadeU 1.1s ease .2s both;
}

.earth-wrap{
  position:relative;
  width:clamp(120px,18vw,168px);
  height:clamp(120px,18vw,168px);
  cursor:pointer;
  animation:floatY 4s ease-in-out infinite;
  transition:transform .2s;
}
.earth-wrap:hover{transform:scale(1.07);}
.earth-wrap:active{transform:scale(0.96);}

#earthC{
  display:block;border-radius:50%;
  width:100%;height:100%;
}

.ring1{
  position:absolute;top:-10px;left:-10px;right:-10px;bottom:-10px;
  border-radius:50%;
  border:1.5px dashed rgba(147,210,255,.32);
  animation:spinR 26s linear infinite;
  pointer-events:none;
}
.ring2{
  position:absolute;top:-22px;left:-22px;right:-22px;bottom:-22px;
  border-radius:50%;
  border:1px solid rgba(56,189,248,.14);
  animation:pulseO 3s ease-out infinite;
  pointer-events:none;
}

.hint{
  margin-top:20px;
  font-size:11px;color:rgba(147,210,255,.6);
  letter-spacing:3px;text-transform:uppercase;
  transition:opacity .4s;
  animation:blink 2.5s ease-in-out infinite, fadeU 1.3s ease .5s both;
}

.vbar{
  display:flex;align-items:flex-end;gap:4px;
  height:32px;margin-top:14px;
  opacity:0;transition:opacity .4s;
}
.vbar.active{opacity:1;}
.vbar span{
  width:5px;border-radius:3px;height:4px;
  background:linear-gradient(180deg,#38bdf8,#0369a1);
}
.vbar.active span:nth-child(1){animation:bar .60s ease-in-out infinite alternate;}
.vbar.active span:nth-child(2){animation:bar .50s ease-in-out .10s infinite alternate;}
.vbar.active span:nth-child(3){animation:bar .70s ease-in-out .05s infinite alternate;}
.vbar.active span:nth-child(4){animation:bar .40s ease-in-out .15s infinite alternate;}
.vbar.active span:nth-child(5){animation:bar .65s ease-in-out .08s infinite alternate;}

/* fade-out transition */
#landing.fade-out{
  animation:fadeOut .7s ease forwards;
}

@keyframes fadeD{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:none;}}
@keyframes fadeU{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes spinR{to{transform:rotate(360deg);}}
@keyframes pulseO{0%{transform:scale(1);opacity:.5;}100%{transform:scale(1.6);opacity:0;}}
@keyframes blink{0%,100%{opacity:.35;}50%{opacity:1;}}
@keyframes bar{from{height:4px;}to{height:26px;}}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
</style>
</head>
<body>

<div id="landing">
  <canvas id="stars"></canvas>
  <canvas id="waveC"></canvas>

  <div class="brand">HydroTech</div>

  <div class="earth-scene">
    <div class="earth-wrap" id="earthBtn">
      <div class="ring2"></div>
      <div class="ring1"></div>
      <canvas id="earthC" width="336" height="336"></canvas>
    </div>
    <div class="hint" id="hint">Click Earth to Launch</div>
    <div class="vbar" id="vbar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<script>
(function(){

  /* ── Earth ── */
  function drawEarth(ctx, W, off){
    var R=W/2;
    ctx.clearRect(0,0,W,W);
    var clip=new Path2D();
    clip.arc(R,R,R-1,0,Math.PI*2);
    ctx.save();ctx.clip(clip);

    var og=ctx.createLinearGradient(0,0,0,W);
    og.addColorStop(0,'#0a2f5e');og.addColorStop(.4,'#0d47a1');
    og.addColorStop(.7,'#0e3a80');og.addColorStop(1,'#061d4a');
    ctx.fillStyle=og;ctx.fillRect(0,0,W,W);

    var lands=[
      {px:.06,py:.14,pw:.24,ph:.32,c:'#1b5e20'},
      {px:.25,py:.09,pw:.18,ph:.28,c:'#2e7d32'},
      {px:.50,py:.17,pw:.31,ph:.35,c:'#1b5e20'},
      {px:.53,py:.54,pw:.24,ph:.21,c:'#33691e'},
      {px:.11,py:.52,pw:.15,ph:.19,c:'#2e7d32'},
      {px:.66,py:.12,pw:.16,ph:.12,c:'#388e3c'},
      {px:.34,py:.59,pw:.12,ph:.13,c:'#1b5e20'},
    ];
    ctx.save();
    var dx=(off%(W*1.55))-W*.28;
    ctx.translate(dx,0);
    for(var rep=-1;rep<=2;rep++){
      ctx.save();ctx.translate(rep*W*1.55,0);
      lands.forEach(function(l){
        var lx=l.px*W,ly=l.py*W,lw=l.pw*W,lh=l.ph*W,lr=lw*.18;
        ctx.beginPath();
        ctx.moveTo(lx+lr,ly);ctx.arcTo(lx+lw,ly,lx+lw,ly+lh,lr);
        ctx.arcTo(lx+lw,ly+lh,lx,ly+lh,lr);ctx.arcTo(lx,ly+lh,lx,ly,lr);
        ctx.arcTo(lx,ly,lx+lw,ly,lr);ctx.closePath();
        var n=parseInt(l.c.slice(1),16);
        var br='rgb('+Math.min(255,((n>>16)&0xff)+45)+','+Math.min(255,((n>>8)&0xff)+50)+','+Math.min(255,(n&0xff)+20)+')';
        var dr='rgb('+Math.max(0,((n>>16)&0xff)-35)+','+Math.max(0,((n>>8)&0xff)-30)+','+Math.max(0,(n&0xff)-15)+')';
        var lg=ctx.createLinearGradient(lx,ly,lx+lw,ly+lh);
        lg.addColorStop(0,br);lg.addColorStop(1,dr);
        ctx.fillStyle=lg;ctx.fill();
        ctx.strokeStyle='rgba(56,142,60,.35)';ctx.lineWidth=.8;ctx.stroke();
        ctx.fillStyle='rgba(139,195,74,.06)';ctx.fillRect(lx,ly,lw,lh*.4);
      });
      ctx.restore();
    }
    ctx.restore();

    var iN=ctx.createLinearGradient(0,0,0,W*.14);
    iN.addColorStop(0,'rgba(225,245,254,.92)');iN.addColorStop(1,'rgba(200,235,255,0)');
    ctx.fillStyle=iN;ctx.fillRect(0,0,W,W*.14);
    var iS=ctx.createLinearGradient(0,W*.87,0,W);
    iS.addColorStop(0,'rgba(200,235,255,0)');iS.addColorStop(1,'rgba(225,245,254,.88)');
    ctx.fillStyle=iS;ctx.fillRect(0,W*.87,W,W*.13);

    for(var i=0;i<7;i++){
      var cy=W*(.12+i*.11);
      var cg=ctx.createLinearGradient(0,cy-3,0,cy+3);
      cg.addColorStop(0,'rgba(255,255,255,0)');
      cg.addColorStop(.5,'rgba(255,255,255,.09)');
      cg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=cg;ctx.fillRect(0,cy-3,W,6);
    }

    var atmo=ctx.createRadialGradient(R,R,R*.7,R,R,R);
    atmo.addColorStop(0,'rgba(0,0,0,0)');
    atmo.addColorStop(.76,'rgba(10,70,140,.1)');
    atmo.addColorStop(.88,'rgba(56,189,248,.2)');
    atmo.addColorStop(1,'rgba(100,210,255,.45)');
    ctx.fillStyle=atmo;ctx.fillRect(0,0,W,W);

    var shine=ctx.createRadialGradient(R*.52,R*.4,0,R*.52,R*.4,R*.72);
    shine.addColorStop(0,'rgba(255,255,255,.24)');
    shine.addColorStop(.45,'rgba(255,255,255,.06)');
    shine.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shine;ctx.fillRect(0,0,W,W);

    var shad=ctx.createRadialGradient(R*1.38,R*1.22,0,R*1.32,R*1.18,R*1.25);
    shad.addColorStop(0,'rgba(0,0,0,0)');
    shad.addColorStop(.55,'rgba(0,0,0,0)');
    shad.addColorStop(1,'rgba(0,4,18,.78)');
    ctx.fillStyle=shad;ctx.fillRect(0,0,W,W);
    ctx.restore();

    var rim=ctx.createRadialGradient(R,R,R*.86,R,R,R);
    rim.addColorStop(0,'rgba(56,189,248,0)');
    rim.addColorStop(1,'rgba(56,189,248,.28)');
    ctx.save();ctx.clip(clip);ctx.fillStyle=rim;ctx.fillRect(0,0,W,W);ctx.restore();
  }

  var ec=document.getElementById('earthC');
  var ectx=ec.getContext('2d');
  var eoff=0;
  function animE(){drawEarth(ectx,336,eoff);eoff+=.45;requestAnimationFrame(animE);}
  animE();

  /* ── Stars ── */
  var sc=document.getElementById('stars');
  var sctx=sc.getContext('2d');
  function drawStars(){
    sc.width=window.innerWidth;sc.height=window.innerHeight;
    sctx.clearRect(0,0,sc.width,sc.height);
    for(var i=0;i<260;i++){
      var x=Math.random()*sc.width,y=Math.random()*sc.height*.7;
      var r=Math.random()*1.4+.2;
      sctx.beginPath();sctx.arc(x,y,r,0,Math.PI*2);
      sctx.fillStyle='rgba(255,255,255,'+(Math.random()*.75+.1)+')';sctx.fill();
    }
  }
  drawStars();

  /* ── Waves ── */
  var wc=document.getElementById('waveC');
  var wctx=wc.getContext('2d');
  var winc=0;
  function resizeW(){wc.width=window.innerWidth;wc.height=window.innerHeight*.5;}
  resizeW();
  window.addEventListener('resize',function(){drawStars();resizeW();});
  function animW(){
    wctx.clearRect(0,0,wc.width,wc.height);
    [[.006,38,'#0d3b6e',.54],[.009,24,'#1565c0',.38],[.014,14,'#1976d2',.27]].forEach(function(p,i){
      wctx.fillStyle=p[2];wctx.globalAlpha=p[3];
      wctx.beginPath();wctx.moveTo(0,wc.height);
      var sy=wc.height*.36;
      for(var x=0;x<=wc.width;x++){
        wctx.lineTo(x,sy+Math.sin(x*p[0]+winc*(1+i*.42))*p[1]*Math.cos(x*.003+winc*.35));
      }
      wctx.lineTo(wc.width,wc.height);wctx.closePath();wctx.fill();
    });
    wctx.globalAlpha=.08;wctx.fillStyle='#fff';
    for(var i=0;i<6;i++){
      var bx=((winc*16+i*130)%(wc.width+100))-50;
      var by=wc.height*.3+Math.sin(winc*.7+i)*11;
      wctx.beginPath();wctx.ellipse(bx,by,22+i*3,5,0,0,Math.PI*2);wctx.fill();
    }
    wctx.globalAlpha=1;winc+=.018;requestAnimationFrame(animW);
  }
  animW();

  /* ── Voice ── */
  function speakWelcome(cb){
    var vbar=document.getElementById('vbar');
    var hint=document.getElementById('hint');
    hint.style.opacity='0';
    vbar.classList.add('active');
    if(!window.speechSynthesis){cb();return;}
    var u=new SpeechSynthesisUtterance('Welcome to HydroTech');
    u.pitch=1.15;u.rate=.88;u.volume=1;
    function setVoice(){
      var voices=window.speechSynthesis.getVoices();
      var f=voices.find(function(v){
        return /samantha|zira|susan|victoria|karen|moira|fiona|tessa|veena|allison|ava|serena|female/i.test(v.name);
      })||voices.find(function(v){return /en/i.test(v.lang);})||voices[0];
      if(f)u.voice=f;
    }
    setVoice();
    if(!window.speechSynthesis.getVoices().length){
      window.speechSynthesis.onvoiceschanged=setVoice;
    }
    u.onend=function(){vbar.classList.remove('active');cb();};
    window.speechSynthesis.speak(u);
  }

  /* ── Click ── */
  document.getElementById('earthBtn').addEventListener('click',function(){
    speakWelcome(function(){
      document.getElementById('landing').classList.add('fade-out');
      setTimeout(function(){
        /* ---- CHANGE THIS URL to your Gradio share link or localhost ---- */
        window.location.href='http://127.0.0.1:7860';
      },700);
    });
  });

})();
</script>
</body>
</html>
